name: Bug 报告
description: 报告可以稳定复现的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 请先隐藏截图和日志中的提示词、账号、密钥等敏感信息。
  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: 例如 v0.1.0
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: 操作系统
      placeholder: 例如 Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 请按顺序描述操作步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已确认内容中不包含提示词、账号、密钥或其他隐私数据
          required: true
