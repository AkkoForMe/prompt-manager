name: 功能建议
description: 提议一个新功能或体验改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 请描述使用场景，而不只是期望的按钮或实现方式。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的体验
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 尝试过的替代方案
